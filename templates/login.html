<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Calendar &ndash; Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='theme.js') }}"></script>
</head>
<body>
<div class="login-container">
    <div class="login-box">
        <div style="display:flex;justify-content:flex-end;margin:-8px -8px 0 0;">
            <button class="theme-toggle" style="background:var(--surface-alt);color:var(--text-secondary);border:1px solid var(--border-strong);">&#9684;</button>
        </div>
        <div class="login-icon">&#128197;</div>
        <h1>Family Calendar</h1>
        <p>Enter the family password to continue.</p>
        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/login">
            <div class="form-group">
                <label for="password">Password</label>
                <div style="position:relative">
                    <input type="password" id="password" name="password" required autofocus placeholder="Enter password" style="padding-right:3rem">
                    <button type="button" onclick="togglePassword()" style="position:absolute;right:0.5rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;color:#888;padding:0.25rem" title="Show password">&#128065;</button>
                </div>
            </div>
            <button type="submit" class="btn-login">Sign In</button>
        </form>
        <script>
        function togglePassword() {
            const inp = document.getElementById('password');
            const btn = event.currentTarget;
            if (inp.type === 'password') { inp.type = 'text'; btn.title = 'Hide password'; btn.style.opacity = '1'; }
            else { inp.type = 'password'; btn.title = 'Show password'; btn.style.opacity = '0.6'; }
        }
        </script>
    </div>
</div>
</body>
</html>
