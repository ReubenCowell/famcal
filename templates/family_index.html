<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Calendar</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='theme.js') }}"></script>
</head>
<body>
<div class="app-shell">
    <!-- Top Nav -->
    <nav class="top-nav">
        <span class="brand">&#128197; Family Calendar</span>
        <div class="nav-links">
            <a href="/" class="active">Calendar</a>
            <a href="/admin">Admin</a>
            <a href="/logout" id="logoutLink" style="display:none;">Logout</a>
            <button class="theme-toggle" title="Toggle theme">&#9684;</button>
        </div>
    </nav>

    <!-- Toolbar -->
    <div class="toolbar">
        <div class="nav-btns">
            <button class="btn btn-icon" id="btnPrev" title="Previous month">&#9664;</button>
            <button class="btn" id="btnToday">Today</button>
            <button class="btn btn-icon" id="btnNext" title="Next month">&#9654;</button>
        </div>
        <span class="month-label" id="monthLabel"></span>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search events...">
            <span class="search-count" id="searchCount"></span>
            <button class="btn btn-icon btn-sm" id="btnClearSearch" style="display:none;" title="Clear search">&times;</button>
        </div>
        <div class="toolbar-right">
            <button class="btn btn-icon btn-sm" id="btnRefresh" title="Refresh now">&#8635;</button>
            <select class="refresh-select" id="refreshSelect" title="Auto-refresh interval">
                <option value="30">30s</option>
                <option value="60" selected>1m</option>
                <option value="300">5m</option>
                <option value="0">Off</option>
            </select>
            <span class="refresh-indicator" id="refreshIndicator"></span>
            <div class="view-switcher">
                <button id="vsMonth" class="active" title="Month view">Month</button>
                <button id="vsWeek" title="Week view">Week</button>
                <button id="vsList" title="List view">List</button>
            </div>
        </div>
    </div>

    <!-- Member pills -->
    <div class="member-pills" id="memberPills">
        <span class="label">Members</span>
    </div>

    <!-- Feed bar (shown when one member selected) -->
    <div class="feed-bar" id="feedBar" style="display:none;">
        <span>&#128225; Subscription URL:</span>
        <code id="feedUrl"></code>
        <button class="btn btn-sm btn-primary" id="btnCopy">Copy</button>
        <span class="copy-feedback" id="copyFeedback">Copied!</span>
        <button class="btn btn-sm" id="btnDownloadMember" title="Download .ics file">&#11015; Download</button>
    </div>

    <!-- Combined feed bar -->
    <div class="feed-bar combined-feed-bar" id="combinedFeedBar" style="display:none;">
        <span>&#128106; Combined Family Feed:</span>
        <code id="combinedFeedUrl"></code>
        <button class="btn btn-sm btn-primary" id="btnCopyCombined">Copy</button>
        <span class="copy-feedback" id="copyCombinedFeedback">Copied!</span>
        <button class="btn btn-sm" id="btnDownloadCombined" title="Download combined .ics file">&#11015; Download</button>
    </div>

    <!-- Main content: grid + day panel -->
    <div class="main-content">
        <div class="calendar-area">
            <!-- Month grid -->
            <div class="month-grid-wrap" id="monthGridWrap">
                <div class="month-grid" id="monthGrid"></div>
            </div>
            <!-- Week view -->
            <div class="week-grid-wrap" id="weekGridWrap" style="display:none;">
                <div class="week-grid" id="weekGrid"></div>
            </div>
            <!-- List view -->
            <div class="list-view" id="listView"></div>
            <!-- Empty state -->
            <div class="empty-state" id="emptyState" style="display:none;">
                <p class="big">No family members configured</p>
                <p>Visit the <a href="/admin">admin page</a> to add members and calendars.</p>
            </div>
        </div>
        <!-- Day detail panel -->
        <div class="day-panel hidden" id="dayPanel">
            <div class="day-panel-header">
                <h3 id="dayPanelTitle"></h3>
                <button class="btn btn-sm" id="btnClosePanel">&times;</button>
            </div>
            <div class="day-panel-body" id="dayPanelBody"></div>
        </div>
    </div>
</div>

<!-- Tooltip -->
<div class="ev-tooltip" id="tooltip" style="display:none;"></div>

<!-- Event Detail Modal -->
<div class="event-modal-overlay" id="eventModal">
    <div class="event-modal">
        <div class="event-modal-header">
            <h3 id="modalTitle"></h3>
            <button class="btn btn-sm" id="btnCloseModal">&times;</button>
        </div>
        <div class="event-modal-body" id="modalBody"></div>
    </div>
</div>

<script>
(function() {
    'use strict';

    // ===== State =====
    let members = [];
    let combinedFeedUrl = '';
    let activeMembers = new Set();  // member IDs currently toggled on
    let events = [];
    let viewDate = new Date();     // 1st of current view month
    let selectedDate = null;
    let currentView = 'month';     // 'month' | 'week' | 'list'
    const MAX_EVENTS_PER_CELL = 3;

    // Search state
    let searchTerm = '';

    // Monday-start helper: getDay() gives 0=Sun..6=Sat; this returns 0=Mon..6=Sun
    function mondayOffset(d) { return (d.getDay() + 6) % 7; }

    // Auto-refresh state
    let refreshTimerId = null;
    let lastEventsHash = '';
    let lastRefreshTime = null;
    let displayEvents = []; // flat array for modal references

    // ===== DOM refs =====
    const $monthLabel  = document.getElementById('monthLabel');
    const $monthGrid   = document.getElementById('monthGrid');
    const $monthWrap   = document.getElementById('monthGridWrap');
    const $weekGrid    = document.getElementById('weekGrid');
    const $weekWrap    = document.getElementById('weekGridWrap');
    const $listView    = document.getElementById('listView');
    const $memberPills = document.getElementById('memberPills');
    const $feedBar     = document.getElementById('feedBar');
    const $feedUrl     = document.getElementById('feedUrl');
    const $combinedBar = document.getElementById('combinedFeedBar');
    const $combinedUrl = document.getElementById('combinedFeedUrl');
    const $emptyState  = document.getElementById('emptyState');
    const $dayPanel    = document.getElementById('dayPanel');
    const $dayTitle    = document.getElementById('dayPanelTitle');
    const $dayBody     = document.getElementById('dayPanelBody');
    const $tooltip     = document.getElementById('tooltip');
    const $searchInput = document.getElementById('searchInput');
    const $searchCount = document.getElementById('searchCount');
    const $btnClearSearch = document.getElementById('btnClearSearch');
    const $refreshIndicator = document.getElementById('refreshIndicator');
    const $refreshSelect = document.getElementById('refreshSelect');
    const $eventModal  = document.getElementById('eventModal');
    const $modalTitle  = document.getElementById('modalTitle');
    const $modalBody   = document.getElementById('modalBody');

    // ===== Init =====
    viewDate = new Date();
    viewDate.setDate(1);

    document.getElementById('btnPrev').onclick = () => { navigatePrev(); refresh(); };
    document.getElementById('btnNext').onclick = () => { navigateNext(); refresh(); };
    document.getElementById('btnToday').onclick = () => { viewDate = new Date(); if (currentView !== 'week') viewDate.setDate(1); refresh(); };
    document.getElementById('btnClosePanel').onclick = () => { selectedDate = null; $dayPanel.classList.add('hidden'); renderGrid(); };
    document.getElementById('btnCopy').onclick = copyFeed;
    document.getElementById('btnCopyCombined').onclick = copyCombinedFeed;
    document.getElementById('btnDownloadMember').onclick = () => {
        if (activeMembers.size === 1) {
            const mid = [...activeMembers][0];
            window.location.href = '/' + encodeURIComponent(mid) + '/calendar.ics?download=1';
        }
    };
    document.getElementById('btnDownloadCombined').onclick = () => {
        window.location.href = '/family/calendar.ics?download=1';
    };

    document.getElementById('vsMonth').onclick = () => switchView('month');
    document.getElementById('vsWeek').onclick  = () => switchView('week');
    document.getElementById('vsList').onclick  = () => switchView('list');

    // Search
    let searchTimer = null;
    $searchInput.oninput = () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
            searchTerm = $searchInput.value.trim();
            $btnClearSearch.style.display = searchTerm ? '' : 'none';
            render();
            updateSearchCount();
        }, 300);
    };
    $btnClearSearch.onclick = () => {
        $searchInput.value = '';
        searchTerm = '';
        $btnClearSearch.style.display = 'none';
        $searchCount.textContent = '';
        render();
    };

    // Refresh controls
    document.getElementById('btnRefresh').onclick = () => {
        const btn = document.getElementById('btnRefresh');
        btn.classList.add('btn-refresh-spin');
        setTimeout(() => btn.classList.remove('btn-refresh-spin'), 600);
        fetchEvents(false);
    };
    $refreshSelect.value = localStorage.getItem('famcal-refresh-interval') || '60';
    $refreshSelect.onchange = () => {
        localStorage.setItem('famcal-refresh-interval', $refreshSelect.value);
        setupAutoRefresh();
    };

    // Modal close handlers
    document.getElementById('btnCloseModal').onclick = closeEventModal;
    $eventModal.onclick = (e) => { if (e.target === $eventModal) closeEventModal(); };
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeEventModal(); });

    loadMembers();
    setupAutoRefresh();

    // Pause/resume auto-refresh on visibility change
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible' && activeMembers.size > 0) {
            fetchEvents(true);
        }
    });

    // ===== Functions =====

    async function loadMembers() {
        try {
            const res = await fetch('/api/members');
            const data = await res.json();
            members = data.members || [];
            combinedFeedUrl = data.combined_feed_url || '';
        } catch (e) {
            members = [];
            combinedFeedUrl = '';
        }
        if (members.length === 0) {
            $emptyState.style.display = '';
            $monthWrap.style.display = 'none';
            $memberPills.innerHTML = '<span class="label">Members</span>';
            return;
        }
        $emptyState.style.display = 'none';
        // Activate all members by default
        activeMembers = new Set(members.map(m => m.id));
        // Show combined feed bar
        if (combinedFeedUrl && members.length > 0) {
            $combinedUrl.textContent = combinedFeedUrl;
            $combinedBar.style.display = '';
        }
        renderPills();
        refresh();
    }

    function renderPills() {
        let html = '<span class="label">Members</span>';
        members.forEach(m => {
            const isActive = activeMembers.has(m.id);
            html += `<span class="pill ${isActive ? 'active' : ''}" data-mid="${esc(m.id)}">` +
                    `<span class="dot" style="background:${esc(m.color)}"></span>${esc(m.name)}</span>`;
        });
        $memberPills.innerHTML = html;
        // Bind clicks
        $memberPills.querySelectorAll('.pill').forEach(el => {
            el.onclick = () => toggleMember(el.dataset.mid);
        });
        updateFeedBar();
    }

    function toggleMember(mid) {
        if (activeMembers.has(mid)) {
            if (activeMembers.size === 1) return; // keep at least one
            activeMembers.delete(mid);
        } else {
            activeMembers.add(mid);
        }
        renderPills();
        fetchEvents();
    }

    function updateFeedBar() {
        if (activeMembers.size === 1) {
            const mid = [...activeMembers][0];
            const m = members.find(x => x.id === mid);
            if (m) {
                $feedUrl.textContent = m.feed_url;
                $feedBar.style.display = '';
                return;
            }
        }
        $feedBar.style.display = 'none';
    }

    function copyFeed() {
        const url = $feedUrl.textContent;
        navigator.clipboard.writeText(url).then(() => {
            const fb = document.getElementById('copyFeedback');
            fb.classList.add('show');
            setTimeout(() => fb.classList.remove('show'), 2000);
        });
    }

    function copyCombinedFeed() {
        navigator.clipboard.writeText(combinedFeedUrl).then(() => {
            const fb = document.getElementById('copyCombinedFeedback');
            fb.classList.add('show');
            setTimeout(() => fb.classList.remove('show'), 2000);
        });
    }

    async function refresh() {
        updateMonthLabel();
        await fetchEvents();
    }

    function updateMonthLabel() {
        if (currentView === 'week') {
            const weekStart = new Date(viewDate);
            weekStart.setDate(weekStart.getDate() - mondayOffset(weekStart));
            const weekEnd = new Date(weekStart);
            weekEnd.setDate(weekEnd.getDate() + 6);
            const opts = { month: 'short', day: 'numeric' };
            $monthLabel.textContent = weekStart.toLocaleDateString(undefined, opts) + ' \u2013 ' + weekEnd.toLocaleDateString(undefined, { ...opts, year: 'numeric' });
        } else {
            $monthLabel.textContent = viewDate.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
        }
    }

    async function fetchEvents(isAutoRefresh) {
        if (activeMembers.size === 0) { events = []; render(); return; }
        let gridStart, gridEnd;
        if (currentView === 'week') {
            gridStart = new Date(viewDate);
            gridStart.setDate(gridStart.getDate() - mondayOffset(gridStart));
            gridEnd = new Date(gridStart);
            gridEnd.setDate(gridEnd.getDate() + 7);
        } else {
            const y = viewDate.getFullYear(), m = viewDate.getMonth();
            const first = new Date(y, m, 1);
            const last = new Date(y, m + 1, 0);
            gridStart = new Date(first);
            gridStart.setDate(gridStart.getDate() - mondayOffset(gridStart));
            gridEnd = new Date(last);
            gridEnd.setDate(gridEnd.getDate() + (6 - mondayOffset(gridEnd)) + 1);
        }

        const startISO = dateToISO(gridStart);
        const endISO = dateToISO(gridEnd);
        const ids = [...activeMembers].join(',');

        try {
            const res = await fetch(`/api/events?start=${startISO}&end=${endISO}&member_ids=${encodeURIComponent(ids)}`);
            const data = await res.json();
            const newEvents = data.events || [];
            const newHash = JSON.stringify(newEvents);

            if (isAutoRefresh && newHash === lastEventsHash) {
                lastRefreshTime = new Date();
                updateRefreshTime();
                return; // no change
            }

            lastEventsHash = newHash;
            events = newEvents;
            lastRefreshTime = new Date();
            updateRefreshTime();
            render();

            if (isAutoRefresh) showRefreshUpdated();
        } catch (e) {
            events = [];
            render();
        }
    }

    function navigatePrev() {
        if (currentView === 'week') {
            viewDate.setDate(viewDate.getDate() - 7);
        } else {
            viewDate.setMonth(viewDate.getMonth() - 1);
        }
    }

    function navigateNext() {
        if (currentView === 'week') {
            viewDate.setDate(viewDate.getDate() + 7);
        } else {
            viewDate.setMonth(viewDate.getMonth() + 1);
        }
    }

    function render() {
        displayEvents = [];
        if (currentView === 'month') {
            renderGrid();
        } else if (currentView === 'week') {
            renderWeekGrid();
        }
        renderList();
        if (selectedDate) renderDayPanel();

        // Set print title
        $monthWrap.setAttribute('data-print-title', $monthLabel.textContent || '');
    }

    // ===== Month Grid =====
    function renderGrid() {
        const y = viewDate.getFullYear(), m = viewDate.getMonth();
        const first = new Date(y, m, 1);
        const last = new Date(y, m + 1, 0);
        const today = new Date();
        const todayStr = dateToISO(today);

        const filtered = getFilteredEvents();
        const dayMap = buildDayMap(filtered);

        // Collect weeks
        const weeks = [];
        const cursor = new Date(first);
        cursor.setDate(cursor.getDate() - mondayOffset(cursor));
        let currentWeek = [];
        while (cursor <= last || cursor.getDay() !== 1) {
            currentWeek.push(new Date(cursor));
            if (currentWeek.length === 7) {
                weeks.push(currentWeek);
                currentWeek = [];
            }
            cursor.setDate(cursor.getDate() + 1);
        }

        // Identify multi-day all-day events
        const multiDaySet = new Set();
        filtered.forEach(ev => {
            if (!ev.all_day || !ev.end || !activeMembers.has(ev.member_id)) return;
            const startDate = ev.start.substring(0, 10);
            const endDate = ev.end.substring(0, 10);
            if (startDate < endDate) multiDaySet.add(ev);
        });

        let html = '';
        const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
        days.forEach(d => { html += `<div class="day-header">${d}</div>`; });

        weeks.forEach(weekDays => {
            const weekStartISO = dateToISO(weekDays[0]);
            const weekEndDate = new Date(weekDays[6]);
            weekEndDate.setDate(weekEndDate.getDate() + 1);
            const weekEndISO = dateToISO(weekEndDate);

            // Find spanning events for this week
            const weekSpanners = [];
            multiDaySet.forEach(ev => {
                const evStart = ev.start.substring(0, 10);
                const evEnd = ev.end.substring(0, 10);
                if (evStart < weekEndISO && evEnd > weekStartISO) {
                    let startCol = 1, endCol = 8;
                    for (let i = 0; i < 7; i++) {
                        const dayISO = dateToISO(weekDays[i]);
                        if (dayISO === evStart) startCol = i + 1;
                        if (dayISO === evEnd) endCol = i + 1;
                    }
                    if (evStart < weekStartISO) startCol = 1;
                    if (evEnd >= weekEndISO) endCol = 8;
                    weekSpanners.push({ ev, startCol, endCol });
                }
            });

            // Allocate lanes (greedy, longest first)
            const lanes = [];
            weekSpanners.sort((a, b) => (b.endCol - b.startCol) - (a.endCol - a.startCol) || a.startCol - b.startCol);
            weekSpanners.forEach(sp => {
                let placed = false;
                for (let i = 0; i < lanes.length; i++) {
                    const conflicts = lanes[i].some(ex => sp.startCol < ex.endCol && sp.endCol > ex.startCol);
                    if (!conflicts) { lanes[i].push(sp); sp.lane = i; placed = true; break; }
                }
                if (!placed) { sp.lane = lanes.length; lanes.push([sp]); }
            });

            // Render span row if needed
            if (weekSpanners.length > 0) {
                html += '<div class="span-row"><div class="span-row-inner">';
                weekSpanners.forEach(sp => {
                    const color = sp.ev.member_color || '#0078d4';
                    const availCls = 'availability-' + sp.ev.availability;
                    const evIdx = displayEvents.length;
                    displayEvents.push(sp.ev);
                    html += `<div class="span-event ${availCls}" ` +
                        `style="grid-column:${sp.startCol}/${sp.endCol};grid-row:${sp.lane + 1};background:${esc(color)}" ` +
                        `data-ev-idx="${evIdx}" ` +
                        `title="${esc(sp.ev.summary)}">${esc(sp.ev.summary)}</div>`;
                });
                html += '</div></div>';
            }

            // Render 7 day cells
            weekDays.forEach((day, dayIdx) => {
                const iso = dateToISO(day);
                const inMonth = day.getMonth() === m;
                const isToday = iso === todayStr;
                const isSel = selectedDate === iso;
                let cls = 'day-cell';
                if (!inMonth) cls += ' outside';
                if (isToday) cls += ' today';
                if (isSel) cls += ' selected';
                if (dayIdx === 6) cls += ' last-in-row';

                html += `<div class="${cls}" data-date="${iso}">`;
                html += `<div class="day-number">${day.getDate()}</div>`;
                html += '<div class="day-events">';

                // Exclude multi-day spanners from day cells
                const dayEvts = (dayMap[iso] || []).filter(ev => !multiDaySet.has(ev));
                const shown = dayEvts.slice(0, MAX_EVENTS_PER_CELL);
                const extra = dayEvts.length - MAX_EVENTS_PER_CELL;

                shown.forEach(ev => {
                    const color = ev.member_color || '#0078d4';
                    const availCls = 'availability-' + ev.availability;
                    const allDayCls = ev.all_day ? ' all-day' : '';
                    const timePrefix = ev.all_day ? '' : formatShortTime(ev.start) + ' ';
                    const evIdx = displayEvents.length;
                    displayEvents.push(ev);
                    html += `<div class="day-event${allDayCls} ${availCls}" ` +
                            `style="background:${esc(color)}" ` +
                            `data-ev-idx="${evIdx}" ` +
                            `title="${esc(ev.summary)}">${esc(timePrefix + ev.summary)}</div>`;
                });
                if (extra > 0) {
                    html += `<div class="more-events" data-date="${iso}">+${extra} more</div>`;
                }
                html += '</div></div>';
            });
        });

        $monthGrid.innerHTML = html;

        // Bind day cell clicks
        $monthGrid.querySelectorAll('.day-cell').forEach(el => {
            el.onclick = (e) => {
                if (e.target.classList.contains('day-event') || e.target.classList.contains('span-event')) return;
                selectDay(el.dataset.date);
            };
        });
        $monthGrid.querySelectorAll('.more-events').forEach(el => {
            el.onclick = () => selectDay(el.dataset.date);
        });
        // Event chip + spanning bar clicks → open modal
        $monthGrid.querySelectorAll('.day-event, .span-event').forEach(el => {
            el.onclick = (e) => {
                e.stopPropagation();
                const idx = parseInt(el.dataset.evIdx);
                if (!isNaN(idx) && displayEvents[idx]) openEventModal(displayEvents[idx]);
            };
        });
    }

    function selectDay(iso) {
        selectedDate = iso;
        $dayPanel.classList.remove('hidden');
        renderGrid();
        renderDayPanel();
    }

    function renderDayPanel() {
        if (!selectedDate) return;
        const d = new Date(selectedDate + 'T00:00:00');
        $dayTitle.textContent = d.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
        const filtered = getFilteredEvents();
        const dayMap = buildDayMap(filtered);
        const dayEvts = dayMap[selectedDate] || [];
        if (dayEvts.length === 0) {
            $dayBody.innerHTML = '<div class="empty-state"><p>No events</p></div>';
            return;
        }
        $dayBody.innerHTML = dayEvts.map(ev => eventCardHTML(ev)).join('');
        // Bind event card clicks to modal
        $dayBody.querySelectorAll('.event-card[data-ev-idx]').forEach(el => {
            el.style.cursor = 'pointer';
            el.onclick = () => {
                const idx = parseInt(el.dataset.evIdx);
                if (!isNaN(idx) && displayEvents[idx]) openEventModal(displayEvents[idx]);
            };
        });
    }

    // ===== List View =====
    function renderList() {
        const filtered = getFilteredEvents();
        if (filtered.length === 0) {
            $listView.innerHTML = '<div class="empty-state"><p class="big">No events in this range</p></div>';
            return;
        }
        // Group by date
        const groups = {};
        filtered.forEach(ev => {
            if (!ev.start) return;
            if (!activeMembers.has(ev.member_id)) return;
            const d = ev.start.substring(0, 10);
            if (!groups[d]) groups[d] = [];
            groups[d].push(ev);
        });
        const sortedDates = Object.keys(groups).sort();
        let html = '';
        sortedDates.forEach(dateStr => {
            const d = new Date(dateStr + 'T00:00:00');
            html += `<div class="date-group-header">${d.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })}</div>`;
            groups[dateStr].forEach(ev => { html += eventCardHTML(ev); });
        });
        $listView.innerHTML = html;
        // Bind event card clicks to modal
        $listView.querySelectorAll('.event-card[data-ev-idx]').forEach(el => {
            el.style.cursor = 'pointer';
            el.onclick = () => {
                const idx = parseInt(el.dataset.evIdx);
                if (!isNaN(idx) && displayEvents[idx]) openEventModal(displayEvents[idx]);
            };
        });
    }

    // ===== Helpers =====
    function buildDayMap(evts) {
        const map = {};
        evts.forEach(ev => {
            if (!ev.start) return;
            if (!activeMembers.has(ev.member_id)) return;
            const startDate = ev.start.substring(0, 10);

            if (ev.all_day && ev.end) {
                // Span all days from start to end (exclusive)
                const endDate = ev.end.substring(0, 10);
                let cur = new Date(startDate + 'T00:00:00');
                const endD = new Date(endDate + 'T00:00:00');
                while (cur < endD) {
                    const iso = dateToISO(cur);
                    if (!map[iso]) map[iso] = [];
                    map[iso].push(ev);
                    cur.setDate(cur.getDate() + 1);
                }
                // If start == end for all-day, still add start
                if (startDate === endDate) {
                    if (!map[startDate]) map[startDate] = [];
                    if (!map[startDate].includes(ev)) map[startDate].push(ev);
                }
            } else {
                if (!map[startDate]) map[startDate] = [];
                map[startDate].push(ev);
            }
        });
        // Sort within each day: all-day first, then by start time
        for (const k of Object.keys(map)) {
            map[k].sort((a, b) => {
                if (a.all_day && !b.all_day) return -1;
                if (!a.all_day && b.all_day) return 1;
                return (a.start || '').localeCompare(b.start || '');
            });
        }
        return map;
    }

    function eventCardHTML(ev) {
        const evIdx = displayEvents.length;
        displayEvents.push(ev);
        const color = ev.member_color || '#0078d4';
        const timeStr = ev.all_day ? 'All day' : formatTimeRange(ev.start, ev.end);
        const tentCls = ev.availability === 'tentative' ? ' avail-card-tentative' : '';
        let html = `<div class="event-card${tentCls}" style="border-left-color:${esc(color)}" data-ev-idx="${evIdx}">`;
        html += `<div class="ev-time">${esc(timeStr)} <span class="avail-badge avail-${ev.availability}">${esc(ev.availability)}</span></div>`;
        html += `<div class="ev-title"><span class="member-dot" style="background:${esc(color)}"></span>${escHL(ev.summary)}</div>`;
        if (ev.location && ev.location !== 'None' && ev.location !== '') {
            html += `<div class="ev-meta">&#128205; ${escHL(ev.location)}</div>`;
        }
        if (ev.description && ev.description !== 'None' && ev.description !== '') {
            html += `<div class="ev-meta">${escHL(ev.description.substring(0, 150))}</div>`;
        }
        if (members.length > 1) {
            html += `<div class="ev-meta" style="margin-top:4px;"><span class="member-dot" style="background:${esc(color)};vertical-align:middle;"></span> ${esc(ev.member_name)}</div>`;
        }
        html += '</div>';
        return html;
    }

    function showTooltip(e, dateStr, eidx) {
        const dayMap = buildDayMap(events);
        const dayEvts = dayMap[dateStr] || [];
        const ev = dayEvts[eidx];
        if (!ev) return;
        const timeStr = ev.all_day ? 'All day' : formatTimeRange(ev.start, ev.end);
        let html = `<div class="tt-title">${esc(ev.summary)}</div>`;
        html += `<div class="tt-time">${esc(timeStr)}</div>`;
        if (ev.location && ev.location !== 'None' && ev.location !== '') {
            html += `<div class="tt-loc">&#128205; ${esc(ev.location)}</div>`;
        }
        if (ev.description && ev.description !== 'None' && ev.description !== '') {
            html += `<div class="tt-loc">${esc(ev.description.substring(0, 120))}</div>`;
        }
        if (members.length > 1) {
            html += `<div class="tt-member">${esc(ev.member_name)}</div>`;
        }
        $tooltip.innerHTML = html;
        $tooltip.style.display = '';
        const rect = e.target.getBoundingClientRect();
        $tooltip.style.top = (rect.bottom + 6) + 'px';
        $tooltip.style.left = Math.min(rect.left, window.innerWidth - 320) + 'px';
    }

    function hideTooltip() { $tooltip.style.display = 'none'; }

    // ===== Week Grid =====
    function renderWeekGrid() {
        const today = new Date();
        const todayStr = dateToISO(today);
        const weekStart = new Date(viewDate);
        weekStart.setDate(weekStart.getDate() - mondayOffset(weekStart));
        const filtered = getFilteredEvents();
        const dayMap = buildDayMap(filtered);

        const HOUR_HEIGHT = 60; // pixels per hour
        const MINUTES_PER_PIXEL = 60 / HOUR_HEIGHT;

        let html = '<div class="week-header-row">';
        html += '<div class="week-time-gutter week-header-cell"></div>';
        for (let d = 0; d < 7; d++) {
            const day = new Date(weekStart);
            day.setDate(day.getDate() + d);
            const iso = dateToISO(day);
            const isToday = iso === todayStr;
            const dayName = day.toLocaleDateString(undefined, { weekday: 'short' });
            const dayNum = day.getDate();
            html += `<div class="week-header-cell${isToday ? ' today' : ''}">`;
            html += `<span class="week-day-name">${dayName}</span>`;
            html += `<span class="week-day-num${isToday ? ' today-num' : ''}">${dayNum}</span>`;
            html += '</div>';
        }
        html += '</div>';

        // All-day row
        html += '<div class="week-allday-row">';
        html += '<div class="week-time-gutter"><span class="week-time-label">All day</span></div>';
        for (let d = 0; d < 7; d++) {
            const day = new Date(weekStart);
            day.setDate(day.getDate() + d);
            const iso = dateToISO(day);
            const dayEvts = (dayMap[iso] || []).filter(ev => ev.all_day);
            html += '<div class="week-allday-cell">';
            dayEvts.forEach(ev => {
                const color = ev.member_color || '#0078d4';
                const evIdx = displayEvents.length;
                displayEvents.push(ev);
                html += `<div class="week-event week-event-allday${ev.availability === 'tentative' ? ' week-event-tentative' : ''}" style="background:${esc(color)}" data-ev-idx="${evIdx}" title="${esc(ev.summary)}">${esc(ev.summary)}</div>`;
            });
            html += '</div>';
        }
        html += '</div>';

        // Helper: calculate event position and height
        function getEventMetrics(ev) {
            const start = new Date(ev.start);
            const end = ev.end ? new Date(ev.end) : new Date(start.getTime() + 3600000);
            const startMinutes = start.getHours() * 60 + start.getMinutes();
            const endMinutes = end.getHours() * 60 + end.getMinutes();
            const durationMinutes = endMinutes - startMinutes;
            const top = startMinutes / MINUTES_PER_PIXEL;
            const height = Math.max(durationMinutes / MINUTES_PER_PIXEL, 20);
            return { top, height, startMinutes, endMinutes };
        }

        // Helper: detect if two events overlap
        function eventsOverlap(ev1, ev2) {
            const m1 = getEventMetrics(ev1);
            const m2 = getEventMetrics(ev2);
            return m1.startMinutes < m2.endMinutes && m2.startMinutes < m1.endMinutes;
        }

        // Helper: layout overlapping events
        function layoutEvents(events) {
            const columns = [];
            events.forEach(ev => {
                let placed = false;
                for (let i = 0; i < columns.length; i++) {
                    const hasConflict = columns[i].some(existing => eventsOverlap(existing, ev));
                    if (!hasConflict) {
                        columns[i].push(ev);
                        ev._column = i;
                        placed = true;
                        break;
                    }
                }
                if (!placed) {
                    ev._column = columns.length;
                    columns.push([ev]);
                }
            });
            
            events.forEach(ev => {
                ev._totalColumns = columns.length;
            });
        }

        // Time grid body
        html += '<div class="week-body-container">';
        html += '<div class="week-body-inner">';
        
        // Time gutter with hour labels
        html += '<div class="week-time-column">';
        for (let h = 0; h < 24; h++) {
            const label = h === 0 ? '12 AM' : h < 12 ? h + ' AM' : h === 12 ? '12 PM' : (h - 12) + ' PM';
            html += `<div class="week-hour-slot" style="height:${HOUR_HEIGHT}px">`;
            html += `<span class="week-time-label">${label}</span>`;
            html += '</div>';
        }
        html += '</div>';

        // Day columns
        html += '<div class="week-days-grid">';
        for (let d = 0; d < 7; d++) {
            const day = new Date(weekStart);
            day.setDate(day.getDate() + d);
            const iso = dateToISO(day);
            const isToday = iso === todayStr;
            
            // Get all non-all-day events for this day
            const dayEvts = (dayMap[iso] || []).filter(ev => !ev.all_day);
            
            // Layout events to handle overlaps
            dayEvts.sort((a, b) => new Date(a.start) - new Date(b.start));
            layoutEvents(dayEvts);

            html += `<div class="week-day-column${isToday ? ' today' : ''}" data-date="${iso}">`;
            
            // Hour grid lines
            for (let h = 0; h < 24; h++) {
                html += `<div class="week-hour-line" style="top:${h * HOUR_HEIGHT}px"></div>`;
            }
            
            // Render events
            dayEvts.forEach(ev => {
                const metrics = getEventMetrics(ev);
                const color = ev.member_color || '#0078d4';
                const time = formatShortTime(ev.start);
                const endTime = formatShortTime(ev.end);
                const evIdx = displayEvents.length;
                displayEvents.push(ev);
                
                const width = ev._totalColumns > 1 ? (100 / ev._totalColumns) : 100;
                const left = ev._totalColumns > 1 ? (ev._column * width) : 0;
                
                html += `<div class="week-event-positioned${ev.availability === 'tentative' ? ' week-event-tentative' : ''}" `;
                html += `style="top:${metrics.top}px;height:${metrics.height}px;left:${left}%;width:${width}%;background:${esc(color)}" `;
                html += `data-ev-idx="${evIdx}" title="${esc(ev.summary)}">`;
                html += `<div class="week-ev-time">${esc(time)}</div>`;
                html += `<div class="week-ev-title">${esc(ev.summary)}</div>`;
                if (ev.location && ev.location !== 'None' && ev.location !== '') {
                    html += `<div class="week-ev-loc">&#128205; ${esc(ev.location)}</div>`;
                }
                html += '</div>';
            });
            
            html += '</div>';
        }
        html += '</div>'; // week-days-grid
        html += '</div>'; // week-body-inner
        html += '</div>'; // week-body-container

        $weekGrid.innerHTML = html;

        // Bind day column clicks
        $weekGrid.querySelectorAll('.week-day-column').forEach(el => {
            el.onclick = (e) => {
                if (e.target.closest('.week-event-positioned')) return;
                selectDay(el.dataset.date);
            };
        });
        // Week event clicks → open modal
        $weekGrid.querySelectorAll('.week-event-positioned').forEach(el => {
            el.onclick = (e) => {
                e.stopPropagation();
                const idx = parseInt(el.dataset.evIdx);
                if (!isNaN(idx) && displayEvents[idx]) openEventModal(displayEvents[idx]);
            };
        });
    }

    function switchView(v) {
        currentView = v;
        document.getElementById('vsMonth').classList.toggle('active', v === 'month');
        document.getElementById('vsWeek').classList.toggle('active', v === 'week');
        document.getElementById('vsList').classList.toggle('active', v === 'list');
        $monthWrap.classList.toggle('hidden', v !== 'month');
        $weekWrap.style.display = v === 'week' ? '' : 'none';
        $listView.classList.toggle('active', v === 'list');
        if (v === 'week') {
            // When switching to week, set viewDate to current week
            viewDate = new Date();
        }
        refresh();
    }

    function dateToISO(d) {
        return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    function formatShortTime(iso) {
        if (!iso || iso.length <= 10) return '';
        const d = new Date(iso);
        return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    }

    function formatTimeRange(startISO, endISO) {
        const s = formatShortTime(startISO);
        const e = formatShortTime(endISO);
        if (s && e) return s + ' \u2013 ' + e;
        return s || 'All day';
    }

    // Check if password is set to show/hide logout link
    fetch('/login').then(r => r.text()).then(html => {
        if (html.includes('Enter the family password')) {
            document.getElementById('logoutLink').style.display = '';
        }
    }).catch(() => {});

    function esc(s) {
        if (!s) return '';
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    // ===== Search/Filter =====
    function getFilteredEvents() {
        if (!searchTerm) return events;
        const term = searchTerm.toLowerCase();
        return events.filter(ev =>
            (ev.summary && ev.summary.toLowerCase().includes(term)) ||
            (ev.location && ev.location.toLowerCase().includes(term)) ||
            (ev.description && ev.description.toLowerCase().includes(term))
        );
    }

    function escRegExp(s) {
        return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function escHL(s) {
        if (!s) return '';
        let result = esc(s);
        if (searchTerm) {
            const regex = new RegExp('(' + escRegExp(esc(searchTerm)) + ')', 'gi');
            result = result.replace(regex, '<mark>$1</mark>');
        }
        return result;
    }

    function updateSearchCount() {
        if (!searchTerm) { $searchCount.textContent = ''; return; }
        const count = getFilteredEvents().length;
        $searchCount.textContent = count + ' found';
    }

    // ===== Event Modal =====
    function openEventModal(ev) {
        hideTooltip();
        $modalTitle.textContent = ev.summary || 'Untitled';
        let html = '';

        // Date/time
        const timeStr = ev.all_day ? 'All day' : formatTimeRange(ev.start, ev.end);
        let dateStr = '';
        if (ev.start) {
            const startD = new Date(ev.start.length <= 10 ? ev.start + 'T00:00:00' : ev.start);
            dateStr = startD.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
        }
        html += `<div class="modal-row"><span class="modal-icon">&#128197;</span><div class="modal-value"><div class="modal-label">Date & Time</div>${esc(dateStr)}<br>${esc(timeStr)}</div></div>`;

        // Availability
        html += `<div class="modal-row"><span class="modal-icon">&#9201;</span><div class="modal-value"><div class="modal-label">Availability</div><span class="avail-badge avail-${ev.availability}">${esc(ev.availability)}</span></div></div>`;

        // Location
        if (ev.location && ev.location !== 'None' && ev.location !== '') {
            html += `<div class="modal-row"><span class="modal-icon">&#128205;</span><div class="modal-value"><div class="modal-label">Location</div>${esc(ev.location)}</div></div>`;
        }

        // Description
        if (ev.description && ev.description !== 'None' && ev.description !== '') {
            html += `<div class="modal-row"><span class="modal-icon">&#128221;</span><div class="modal-value"><div class="modal-label">Description</div>${esc(ev.description)}</div></div>`;
        }

        // Member
        html += `<div class="modal-row"><span class="modal-icon">&#128100;</span><div class="modal-value"><div class="modal-label">Member</div><div class="modal-member"><span class="member-dot" style="background:${esc(ev.member_color || '#0078d4')}"></span>${esc(ev.member_name)}</div></div></div>`;

        $modalBody.innerHTML = html;
        $eventModal.classList.add('active');
    }

    function closeEventModal() {
        $eventModal.classList.remove('active');
    }

    // ===== Auto-Refresh =====
    function setupAutoRefresh() {
        if (refreshTimerId) clearInterval(refreshTimerId);
        const seconds = parseInt(localStorage.getItem('famcal-refresh-interval') || '60');
        if (seconds <= 0) return;
        refreshTimerId = setInterval(() => {
            if (document.visibilityState === 'hidden') return;
            if (activeMembers.size > 0) fetchEvents(true);
        }, seconds * 1000);
    }

    function updateRefreshTime() {
        if (!lastRefreshTime) return;
        const timeStr = lastRefreshTime.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
        $refreshIndicator.textContent = 'Updated ' + timeStr;
        $refreshIndicator.className = 'refresh-indicator';
    }

    function showRefreshUpdated() {
        $refreshIndicator.textContent = 'Updated!';
        $refreshIndicator.className = 'refresh-indicator refresh-updated';
        setTimeout(() => updateRefreshTime(), 3000);
    }
})();
</script>
</body>
